<!-- Project Overview — the pipeline control centre (projects mode, see specs/projects_mode/).
     A left→right workflow of the four project activities:
        Documents → Problem Framing → Quality → Coverage         [ ▶ Run All ]
     Rules (as specified by the user):
       • "Run All" (right end) runs the whole chain in order; framing is auto-accepted.
       • Clicking a single activity runs ONLY that activity, and is enabled only when
         every activity to its LEFT has run at least once.
     Status for every node is read live from the API on load and after each run. -->
<meta charset="utf-8">
<title>Overview · reqoach</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>document.documentElement.dataset.theme=localStorage.getItem('reqoach-theme')||'light';
// project-scoped: with no project, go to the switcher BEFORE render (no page flash)
if(!new URLSearchParams(location.search).get('project')&&!localStorage.getItem('reqoach-project'))location.replace('projects.html');</script>
<link rel="stylesheet" href="css/nav.css">
<style>
  :root{
    --surface:#fcfcfb; --plane:#e9e9e9; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --axis:#c3c2b7; --border:rgba(11,11,11,.10);
    --accent:#2a78d6; --s1:#d03b3b; --s2:#ec835a; --s3:#fab219; --s4:#6bbf59; --s5:#0ca30c;
    --panel2:rgba(11,11,11,.05); --ok:#0ca30c; --run:#2a78d6;
  }
  html[data-theme="dark"]{
    --surface:#1a1a19; --plane:#0d0d0d; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,.10);
    --accent:#3987e5; --panel2:rgba(255,255,255,.06); --run:#3987e5;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--plane);color:var(--ink);
    font:14px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border)}
  header h1{font-size:16px;margin:0 0 0 5px;font-weight:600}
  header .sub{color:var(--muted);font-size:12.5px;margin-left:2px}
  main{padding:26px 22px;max-width:1180px;margin:0 auto}

  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:9px;
    padding:10px 17px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn:hover{filter:brightness(1.06)}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:none}

  /* ---- pipeline strip ---- */
  .pipe{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:6px 2px 18px}
  .node{position:relative;flex:1 1 0;min-width:190px;background:var(--surface);
    border:1.5px solid var(--border);border-radius:13px;padding:15px 16px 14px;
    display:flex;flex-direction:column;gap:8px;transition:border-color .14s,box-shadow .14s,opacity .14s}
  .node .top{display:flex;align-items:center;gap:9px}
  .node .idx{width:23px;height:23px;border-radius:50%;flex:none;display:grid;place-items:center;
    font-size:12px;font-weight:700;background:var(--panel2);color:var(--ink2)}
  .node .name{font-weight:600;font-size:14px}
  .node .desc{color:var(--muted);font-size:12px;line-height:1.4;min-height:32px}
  .node .state{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600}
  .node .dot{width:9px;height:9px;border-radius:50%;background:var(--axis);flex:none}
  .node .when{color:var(--muted);font-weight:400;font-size:11.5px}
  .node .act{margin-top:2px;display:flex;gap:8px;align-items:center}
  .node .run{border:1px solid var(--accent);background:transparent;color:var(--accent);
    border-radius:8px;padding:6px 12px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
  .node .run:hover{background:color-mix(in srgb,var(--accent) 10%,transparent)}
  .node .link{color:var(--accent);font-size:12px;text-decoration:none;font-weight:600}
  .node .link:hover{text-decoration:underline}
  .node .abort{border:1px solid var(--s1);background:transparent;color:var(--s1);
    border-radius:8px;padding:5px 11px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .node .abort:hover{background:color-mix(in srgb,var(--s1) 12%,transparent)}
  .node .abort:disabled{opacity:.5;cursor:default}

  /* in-node live progress */
  .prog{margin-top:4px;display:flex;flex-direction:column;gap:5px}
  .pstage{font-size:12px;font-weight:600;color:var(--run)}
  .pbar{height:6px;border-radius:4px;background:var(--panel2);overflow:hidden}
  .pbar span{display:block;height:100%;background:var(--run);border-radius:4px;transition:width .45s ease}
  .pcount{font-size:11.5px;color:var(--ink2);font-variant-numeric:tabular-nums}
  .pmsg{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node .badge{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    border-radius:5px;padding:1px 7px}
  .badge.ratified{background:color-mix(in srgb,var(--ok) 16%,transparent);color:var(--ok)}
  .badge.draft{background:color-mix(in srgb,var(--s3) 20%,transparent);color:var(--s3)}

  /* node status variants */
  .node.done{border-color:color-mix(in srgb,var(--ok) 45%,var(--border))}
  .node.done .dot{background:var(--ok)}
  .node.ready{border-color:var(--accent);box-shadow:0 3px 14px color-mix(in srgb,var(--accent) 16%,transparent)}
  .node.ready .dot{background:var(--accent)}
  .node.locked{opacity:.5}
  .node.locked .idx{opacity:.7}
  .node.running{border-color:var(--run)}
  .node.running .dot{background:var(--run);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* connector arrow between nodes */
  .conn{flex:0 0 34px;display:grid;place-items:center;color:var(--axis)}
  .conn svg{width:22px;height:22px}
  .conn.flow{color:var(--ok)}

  /* run-all rail */
  .rail{display:flex;align-items:center;gap:14px;margin:2px 0 22px}
  .rail .hint{color:var(--muted);font-size:12.5px}
  .runall{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:10px;
    padding:11px 20px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
  .runall:hover{filter:brightness(1.06)} .runall:disabled{opacity:.5;cursor:not-allowed;filter:none}
  .abortall{border:1px solid var(--s1);background:transparent;color:var(--s1);border-radius:10px;
    padding:11px 18px;font:inherit;font-size:14px;font-weight:700;cursor:pointer}
  .abortall:hover{background:color-mix(in srgb,var(--s1) 12%,transparent)}
  .abortall:disabled{opacity:.5;cursor:default}
  .delbtn{border:1px solid var(--s1);background:var(--s1);color:#fff;border-radius:10px;
    padding:11px 18px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
  .delbtn:hover{filter:brightness(1.06)} .delbtn:disabled{opacity:.5;cursor:default;filter:none}

  .note{background:var(--surface);border:1px solid var(--border);border-radius:11px;
    padding:14px 17px;color:var(--ink2);font-size:13px;line-height:1.6;max-width:820px}
  .note b{color:var(--ink)}
  #log{margin-top:14px;color:var(--muted);font-size:12.5px;font-variant-numeric:tabular-nums;
    white-space:pre-wrap;min-height:18px}
</style>

<header>
  <div><h1 id="ptitle">Project</h1><div class="sub" id="psub"></div></div>
</header>
<main>
  <div class="rail">
    <div class="hint">Run the whole pipeline, or run one stage at a time — each stage unlocks once the ones before it have run.</div>
    <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
      <button class="delbtn" id="delProject" title="Delete this project and all its data">🗑 Delete</button>
      <button class="abortall" id="abortAll" style="display:none">■ Abort</button>
      <button class="runall" id="runAll" disabled><span>▶</span> Run All</button>
    </div>
  </div>

  <div class="pipe" id="pipe"></div>

  <div id="log"></div>
</main>

<script src="js/nav.js"></script>
<script>
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pid = new URLSearchParams(location.search).get('project') || (() => { try { return localStorage.getItem('reqoach-project'); } catch (e) { return null; } })();
if (!pid) location.replace('projects.html');
const Q = '?project=' + encodeURIComponent(pid);
const when = iso => iso ? new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }) : '';

// The four pipeline stages, in the enforced order.
const STAGES = [
  { key: 'documents', name: 'Documents',       desc: 'Upload the source material to analyse.' },
  { key: 'framing',   name: 'Problem Framing',  desc: 'Distil a structured problem statement from the documents.' },
  { key: 'quality',   name: 'Quality',          desc: 'INCOSE per-requirement scoring (C1–C9) + set-level checks.' },
  { key: 'coverage',  name: 'Coverage',         desc: '16-domain judge panel — are the requirements enough?' },
];

let STATE = {};   // per-stage {done,…} + transient _running/_prog/_stage/_jobId/_runStartMs/_stageStartMs
let busy = false;
let ticker = null;

function log(msg) { $('log').textContent = msg || ''; }

// Friendly names for the pipeline sub-stages the backend emits.
const STAGE_LABEL = {
  queued: 'Queued', framing: 'Distilling problem statement',
  ingest: 'Reading documents', segment: 'Segmenting requirements',
  gate: 'Filtering non-requirements', score: 'Assessing requirements',
  review: 'Reviewing flagged requirements', set_level: 'Set-level analysis',
  requirements: 'Gathering requirements', judges: 'Domain-expert judges', synthesis: 'Synthesising findings',
};
function fmtDur(s) {
  s = Math.max(0, Math.round(s)); const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  return h ? `${h}h ${m}m` : m ? `${m}m ${ss}s` : `${ss}s`;
}

async function loadState() {
  const [proj, ps] = await Promise.all([
    fetch('projects/' + encodeURIComponent(pid)).then(r => r.ok ? r.json() : Promise.reject('project')),
    fetch('projects/' + encodeURIComponent(pid) + '/problem-statement').then(r => r.ok ? r.json() : {}),
  ]);
  $('ptitle').textContent = proj.name || 'Project';
  document.title = (proj.name || 'Project') + ' · reqoach';
  try { localStorage.setItem('reqoach-project', proj.id); localStorage.setItem('reqoach-project-name', proj.name || 'project'); } catch (e) {}

  const docs = proj.documents || [], qr = proj.quality_runs || [], cr = proj.coverage_runs || [];
  const lastWhen = arr => arr.length ? (arr.map(r => r.finished_at || '').sort().slice(-1)[0]) : '';
  STATE = {
    documents: { done: docs.length > 0, info: docs.length ? docs.length + ' document' + (docs.length !== 1 ? 's' : '') : '' },
    framing:   { done: !!(ps && ps.version >= 1 && ps.statement), ratified: !!(ps && ps.ratified), when: ps && ps.updated_at },
    quality:   { done: qr.length > 0, when: lastWhen(qr), count: qr.length },
    coverage:  { done: cr.length > 0, when: lastWhen(cr), count: cr.length },
  };
  $('psub').textContent = pipelineSummary();
  render();

  // If a run is already in flight (e.g. the page was reloaded mid-run), reattach to it
  // so the live progress + Abort come back instead of the run looking idle.
  if (!busy) {
    const aj = await fetch('projects/' + encodeURIComponent(pid) + '/active-job')
      .then(r => r.ok ? r.json() : {}).catch(() => ({}));
    if (aj && aj.job_id) reattach(aj);
  }
}

function pipelineSummary() {
  const done = STAGES.filter(s => STATE[s.key] && STATE[s.key].done).length;
  return done === STAGES.length ? 'Pipeline complete — all four stages have run.'
       : done === 0 ? 'Pipeline not started.'
       : done + ' of ' + STAGES.length + ' stages complete.';
}

// stage i is enabled iff every earlier stage is done
function enabledIndex(i) { for (let k = 0; k < i; k++) if (!(STATE[STAGES[k].key] || {}).done) return false; return true; }

const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg>';

function render() {
  const parts = [];
  STAGES.forEach((s, i) => {
    if (i) parts.push(`<div class="conn ${STATE[STAGES[i - 1].key].done ? 'flow' : ''}">${ARROW}</div>`);
    parts.push(nodeHTML(s, i));
  });
  $('pipe').innerHTML = parts.join('');
  // wire per-node run + abort buttons
  STAGES.forEach(s => {
    const rb = document.getElementById('run-' + s.key);
    if (rb) rb.addEventListener('click', () => runStage(s.key));
    const ab = document.getElementById('abort-' + s.key);
    if (ab) ab.addEventListener('click', () => abortStage(s.key));
  });
  // fill progress for any running node (persisted across the full re-render)
  STAGES.forEach(s => { if (STATE[s.key] && STATE[s.key]._running) renderProg(s.key); });
  const allDone = STAGES.every(s => STATE[s.key].done);
  $('runAll').disabled = busy || !STATE.documents.done;
  $('runAll').innerHTML = allDone ? '<span>↻</span> Re-run All' : '<span>▶</span> Run All';
  $('abortAll').style.display = busy ? '' : 'none';
}

function nodeHTML(s, i) {
  const st = STATE[s.key] || {};
  const enabled = enabledIndex(i);
  const cls = st._running ? 'running' : (st.done ? 'done' : (enabled ? 'ready' : 'locked'));
  let stateLine, action = '', prog = '';
  if (st._running) {
    stateLine = `<span class="dot"></span>Running…`;
    prog = `<div class="prog" id="prog-${s.key}"></div>`;
    action = s.key === 'framing' ? '' : `<button class="abort" id="abort-${s.key}">Abort</button>`;
  }
  else if (st.done) {
    const extra = s.key === 'framing'
      ? `<span class="badge ${st.ratified ? 'ratified' : 'draft'}">${st.ratified ? 'ratified' : 'draft'}</span>`
      : (st.info ? `<span class="when">· ${esc(st.info)}</span>` : (st.when ? `<span class="when">· ${esc(when(st.when))}</span>` : ''));
    stateLine = `<span class="dot"></span>Done ${extra}`;
    action = actionLinks(s, true);
  } else if (enabled) {
    stateLine = `<span class="dot"></span>Ready`;
    action = actionLinks(s, false);
  } else {
    const need = STAGES[[...Array(i).keys()].reverse().find(k => !STATE[STAGES[k].key].done)] .name;
    stateLine = `<span class="dot"></span><span class="when">Locked · run ${esc(need)} first</span>`;
  }
  return `<div class="node ${cls}" id="node-${s.key}">
    <div class="top"><span class="idx">${i + 1}</span><span class="name">${esc(s.name)}</span></div>
    <div class="desc">${esc(s.desc)}</div>
    <div class="state">${stateLine}</div>
    ${prog}
    <div class="act">${action}</div>
  </div>`;
}

// Buttons/links inside a node: primary run/open + a view link when there is output.
function actionLinks(s, done) {
  const view = {
    documents: `<a class="link" href="documents.html${Q}">Manage documents →</a>`,
    framing:   `<a class="link" href="coverage.html${Q}">Review &amp; ratify →</a>`,
    quality:   `<a class="link" href="index.html${Q}">Open dashboard →</a>`,
    coverage:  `<a class="link" href="coverage.html${Q}">Open coverage →</a>`,
  }[s.key];
  if (s.key === 'documents') {                 // documents = upload, not a "run"
    return `<a class="link" href="documents.html${Q}">${done ? 'Manage documents →' : 'Upload documents →'}</a>`;
  }
  const runLabel = done ? 'Re-run' : 'Run';
  return `<button class="run" id="run-${s.key}" ${busy ? 'disabled' : ''}>${runLabel}</button>` + (done ? view : '');
}

// ---- live progress readout inside a running node ----
function applySnapshot(key, s) {
  const st = STATE[key]; if (!st) return;
  const p = s.progress || {};
  const stage = p.stage || s.stage || '';
  if (stage && st._stage !== stage) { st._stage = stage; st._stageStartMs = Date.now(); }  // reset ETA baseline per stage
  st._prog = p; st._elapsed = s.elapsed_s;
  renderProg(key);
}

function renderProg(key) {
  const el = document.getElementById('prog-' + key); if (!el) return;
  const st = STATE[key], p = st._prog || {}, stage = st._stage || '';
  const label = STAGE_LABEL[stage] || (stage || 'Working…');
  const elapsedS = st._runStartMs ? (Date.now() - st._runStartMs) / 1000 : (st._elapsed || 0);
  let html = `<div class="pstage">${esc(label)}${elapsedS ? ` · ${fmtDur(elapsedS)} elapsed` : ''}</div>`;
  const done = p.done, total = p.total;
  // On a stage-"start" tick the count is not yet meaningful (e.g. score reports the
  // task total = reqs×9, not requirements) — wait for the first real progress tick.
  if (p.status !== 'start' && typeof total === 'number' && total > 0 && typeof done === 'number') {
    const pct = Math.min(100, Math.round(done / total * 100));
    html += `<div class="pbar"><span style="width:${pct}%"></span></div>`;
    let line = `${done} / ${total}${p.unit ? ' ' + p.unit : ''} · ${pct}%`;
    const stageMs = st._stageStartMs ? (Date.now() - st._stageStartMs) : 0;
    if (done > 0 && total > done && stageMs > 4000) line += ` · ~${fmtDur(stageMs / 1000 / done * (total - done))} left`;
    else if (done > 0 && total > done) line += ' · estimating…';
    html += `<div class="pcount">${line}</div>`;
  }
  if (p.message) html += `<div class="pmsg">${esc(p.message)}</div>`;
  el.innerHTML = html;
}

function startTicker() { if (!ticker) ticker = setInterval(() => STAGES.forEach(s => { if (STATE[s.key] && STATE[s.key]._running) renderProg(s.key); }), 500); }
function stopTicker() { if (ticker) { clearInterval(ticker); ticker = null; } }

// ---- job polling (quality + coverage share the /jobs/{id} snapshot) ----
function pollJob(jobId, onStage) {
  return new Promise((resolve, reject) => {
    const t = setInterval(async () => {
      const s = await fetch('jobs/' + jobId).then(r => r.ok ? r.json() : null).catch(() => null);
      if (!s) return;
      if (onStage) onStage(s);
      if (s.status === 'done') { clearInterval(t); resolve(s); }
      else if (s.status === 'cancelled') { clearInterval(t); resolve({ cancelled: true }); }
      else if (s.status === 'error') { clearInterval(t); reject(new Error(s.error || 'job failed')); }
    }, 1500);
  });
}

async function frame(autoAccept) {
  const doc = await fetch('projects/' + encodeURIComponent(pid) + '/problem-statement:generate',
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
    .then(r => r.ok ? r.json() : Promise.reject(new Error('framing failed')));
  if (autoAccept && doc && doc.statement) {
    await fetch('projects/' + encodeURIComponent(pid) + '/problem-statement',
      { method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ statement: doc.statement, ratified: true }) });
  }
}

// Run one stage; returns the final snapshot ({cancelled:true} if aborted).
async function runOne(key) {
  STATE[key]._runStartMs = Date.now();
  if (key === 'framing') { STATE[key]._stage = 'framing'; renderProg(key); await frame(false); return {}; }
  const path = key === 'quality' ? '/quality:run' : '/coverage:run';
  const res = await fetch('projects/' + encodeURIComponent(pid) + path, { method: 'POST' }).then(r => r.json());
  if (!res.job_id) throw new Error('could not start ' + key);
  STATE[key]._jobId = res.job_id;
  return await pollJob(res.job_id, s => applySnapshot(key, s));
}

async function runStage(key) {
  if (busy) return;
  resetAbortAll();
  busy = true; STATE[key]._running = true; startTicker(); render();
  const label = STAGES.find(s => s.key === key).name;
  log('Running ' + label + '…');
  try {
    const r = await runOne(key);
    log(r && r.cancelled ? label + ' aborted.' : label + ' complete.');
  } catch (e) { log('✗ ' + label + ' failed: ' + e.message); alert(label + ' failed:\n' + e.message); }
  finally { busy = false; stopTicker(); if (STATE[key]) STATE[key]._running = false; await loadState(); }
}

async function runAll() {
  if (busy) return;
  if (!STATE.documents.done) { alert('Upload at least one document first.'); return; }
  resetAbortAll();
  busy = true; startTicker(); render();
  try {
    // Framing (auto-accepted) → Quality → Coverage, in order.
    STATE.framing._running = true; STATE.framing._runStartMs = Date.now(); STATE.framing._stage = 'framing';
    render(); log('Framing the problem…');
    await frame(true);                                        // generate + auto-accept in one step
    STATE.framing._running = false; STATE.framing.done = true;

    STATE.quality._running = true; render(); log('Running Quality…');
    let r = await runOne('quality');
    STATE.quality._running = false;
    if (r && r.cancelled) { log('Pipeline aborted during Quality.'); return; }
    STATE.quality.done = true;

    STATE.coverage._running = true; render(); log('Running Coverage…');
    r = await runOne('coverage');
    STATE.coverage._running = false;
    log(r && r.cancelled ? 'Pipeline aborted during Coverage.' : 'Pipeline complete.');
  } catch (e) { log('✗ Run All stopped: ' + e.message); alert('Run All stopped:\n' + e.message); }
  finally { busy = false; stopTicker(); ['framing', 'quality', 'coverage'].forEach(k => STATE[k] && (STATE[k]._running = false)); await loadState(); }
}

// Reattach to a job already running server-side (page reloaded mid-run).
function reattach(aj) {
  const key = aj.kind === 'coverage' ? 'coverage' : 'quality';
  busy = true; STATE[key]._running = true; STATE[key]._jobId = aj.job_id; startTicker(); render();
  log('Reattached to a running ' + STAGES.find(s => s.key === key).name + ' job…');
  const finish = async () => { busy = false; stopTicker(); if (STATE[key]) STATE[key]._running = false; await loadState(); };
  pollJob(aj.job_id, s => applySnapshot(key, s))
    .then(r => { log(r && r.cancelled ? key + ' aborted.' : key + ' complete.'); return finish(); })
    .catch(e => { log('✗ ' + key + ' failed: ' + e.message); return finish(); });
}

async function abortStage(key) {
  const st = STATE[key]; if (!st || !st._jobId) return;
  const b = document.getElementById('abort-' + key); if (b) { b.disabled = true; b.textContent = 'Aborting…'; }
  try { await fetch('jobs/' + st._jobId + '/cancel', { method: 'POST' }); log('Aborting… (finishing in-flight work)'); } catch (e) {}
}

async function abortAll() {
  const b = $('abortAll'); if (b) { b.disabled = true; b.textContent = '■ Aborting…'; }
  const running = STAGES.find(s => STATE[s.key] && STATE[s.key]._running && STATE[s.key]._jobId);
  if (running) { try { await fetch('jobs/' + STATE[running.key]._jobId + '/cancel', { method: 'POST' }); } catch (e) {} }
  log('Aborting… (finishing in-flight work)');
}
function resetAbortAll() { const b = $('abortAll'); if (b) { b.disabled = false; b.textContent = '■ Abort'; } }

$('runAll').addEventListener('click', runAll);
$('abortAll').addEventListener('click', abortAll);

$('delProject').addEventListener('click', async () => {
  const name = $('ptitle').textContent || 'this project';
  if (!confirm(`Delete "${name}" and all its documents and analysis runs?\n\nThis cannot be undone.`)) return;
  const b = $('delProject'); b.disabled = true; b.textContent = 'Deleting…';
  try {
    const r = await fetch('projects/' + encodeURIComponent(pid), { method: 'DELETE' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    try { localStorage.removeItem('reqoach-project'); localStorage.removeItem('reqoach-project-name'); } catch (e) {}
    location.replace('projects.html');
  } catch (e) { b.disabled = false; b.textContent = '🗑 Delete'; alert('Could not delete project:\n' + e.message); }
});

loadState().catch(() => location.replace('projects.html'));
</script>
