<!-- Confirmed Overlaps — a dedicated page (reached from the top nav). Lists the
     requirement pairs the set-level judge flagged as duplicate/overlapping, for the
     document selected in the picker. Public (read-only): fetches the same scorecards
     as the dashboard (static data/ + the orchestration API). -->
<meta charset="utf-8">
<title>Confirmed Overlaps · reqoach</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>document.documentElement.dataset.theme=localStorage.getItem('reqoach-theme')||'light';</script>
<link rel="stylesheet" href="css/nav.css">
<style>
  :root{
    --surface:#fcfcfb; --plane:#e9e9e9; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --axis:#c3c2b7; --border:rgba(11,11,11,.10);
    --accent:#2a78d6;
    --s1:#d03b3b; --s2:#ec835a; --s3:#fab219; --s4:#6bbf59; --s5:#0ca30c;
  }
  html[data-theme="dark"]{
    --surface:#1a1a19; --plane:#0d0d0d; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,.10);
    --accent:#3987e5;
    --s1:#d03b3b; --s2:#ec835a; --s3:#fab219; --s4:#6bbf59; --s5:#0ca30c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--plane);color:var(--ink);
    font:14px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:18px;padding:16px 22px;border-bottom:1px solid var(--border)}
  header h1{font-size:16px;margin:0;font-weight:600}
  /* custom themed document dropdown (same component as the dashboard) */
  .docpick{position:relative;margin-top:1px}
  .docpick-btn{display:inline-flex;align-items:center;gap:7px;max-width:620px;
    background:transparent;border:1px solid transparent;border-radius:8px;
    color:var(--ink2);font:inherit;font-size:13px;line-height:1.3;
    padding:3px 8px 3px 7px;cursor:pointer;text-align:left}
  .docpick-btn:hover{color:var(--ink);background:var(--plane)}
  .docpick-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .docpick-caret{width:15px;height:15px;flex:none;background:var(--muted);transition:transform .15s;
    -webkit-mask:url(icons/down-circle-outlined.svg) center/contain no-repeat;
            mask:url(icons/down-circle-outlined.svg) center/contain no-repeat}
  .docpick[data-open="true"] .docpick-caret{background:var(--accent);transform:rotate(180deg)}
  .docpick-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:200;
    min-width:300px;max-width:560px;max-height:62vh;overflow:auto;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    box-shadow:0 12px 34px rgba(0,0,0,.30);padding:6px}
  .docpick-item{display:flex;align-items:baseline;gap:10px;padding:8px 11px;border-radius:7px;
    cursor:pointer;color:var(--ink);font-size:13px;white-space:nowrap}
  .docpick-item:hover{background:var(--plane)}
  .docpick-item[aria-selected="true"]{background:color-mix(in srgb,var(--accent) 16%,var(--surface));font-weight:600}
  .docpick-item .cnt{margin-left:auto;color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
  main{padding:18px 22px 40px;max-width:1080px;margin:0 auto}
  .intro{color:var(--muted);font-size:13px;margin-bottom:16px}
  .intro b{color:var(--ink)}
  .ovpair{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin:11px 0}
  .ovpair .top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .ovpair .ids{font-weight:700;font-size:14px;letter-spacing:.01em}
  .ovpair .score{margin-left:auto;min-width:34px;text-align:center;border-radius:6px;
    padding:2px 9px;color:#fff;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}
  .ovreq{color:var(--ink2);font-size:13px;margin:5px 0;padding-left:11px;border-left:2px solid var(--grid)}
  .ovreq .rid{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);font-size:12px;margin-right:7px}
  .none{color:var(--muted);padding:22px 2px;font-size:13.5px}
</style>

<header>
  <div><h1>Confirmed Overlaps</h1>
    <div class="docpick" id="docpick" data-open="false">
      <button class="docpick-btn" id="docpickBtn" aria-haspopup="listbox" aria-expanded="false" title="Select document">
        <span class="docpick-label" id="docpickLabel"></span><span class="docpick-caret"></span>
      </button>
      <div class="docpick-menu" id="docpickMenu" role="listbox" hidden></div>
    </div></div>
</header>
<main>
  <div class="intro"><b>Requirement pairs judged to duplicate or substantially overlap.</b>
    The percentage is the similarity between the two requirements — higher means a stronger overlap.
    Resolve these by merging or clearly differentiating the two requirements.</div>
  <div id="ovlist"></div>
</main>

<script src="js/nav.js"></script>
<script>
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
// Overlap "score" is a cosine similarity in ~0.8–1.0. Higher = stronger overlap = worse,
// so colour it as a severity (strong overlaps are the most alarming/red).
const ovColor = s => s >= 0.95 ? cssVar('--s1') : s >= 0.90 ? cssVar('--s2') : s >= 0.85 ? cssVar('--s3') : cssVar('--s4');

// ---- custom themed document dropdown (mirrors the dashboard picker) ----
const pick = $('docpick'), pickBtn = $('docpickBtn'), pickLabel = $('docpickLabel'), pickMenu = $('docpickMenu');
let docOpts = [], docValue = null, onDocChange = null;
const splitName = name => { const i = name.lastIndexOf(' · ');
  return i >= 0 ? { main: name.slice(0, i), cnt: name.slice(i + 3) } : { main: name, cnt: '' }; };
const setLabel = () => { const o = docOpts.find(x => x.value === docValue); pickLabel.textContent = o ? o.name : ''; };
function renderMenu() {
  pickMenu.innerHTML = docOpts.map(o => { const s = splitName(o.name);
    return `<div class="docpick-item" role="option" data-val="${esc(o.value)}" aria-selected="${o.value === docValue}">`
      + `<span class="nm">${esc(s.main)}</span>${s.cnt ? `<span class="cnt">${esc(s.cnt)}</span>` : ''}</div>`; }).join('');
}
const menuOpen = () => !pickMenu.hidden;
function openMenu() { if (!docOpts.length) return; renderMenu(); pickMenu.hidden = false; pick.dataset.open = 'true'; pickBtn.setAttribute('aria-expanded', 'true'); }
function closeMenu() { pickMenu.hidden = true; pick.dataset.open = 'false'; pickBtn.setAttribute('aria-expanded', 'false'); }
pickBtn.addEventListener('click', e => { e.stopPropagation(); menuOpen() ? closeMenu() : openMenu(); });
pickMenu.addEventListener('click', e => { const it = e.target.closest('.docpick-item'); if (!it) return;
  const v = it.dataset.val; closeMenu(); if (v !== docValue) { docValue = v; setLabel(); if (onDocChange) onDocChange(v); } });
document.addEventListener('click', () => { if (menuOpen()) closeMenu(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && menuOpen()) closeMenu(); });
const setDocOptions = (opts, startVal, onChange) => { docOpts = opts; docValue = startVal; onDocChange = onChange; setLabel(); };
const showOnly = txt => { docOpts = []; docValue = null; pickLabel.textContent = txt; };

// ---- render the overlaps of the selected document ----
function renderOverlaps(D) {
  const ov = (D.set_level && D.set_level.overlaps) || [];
  const byId = Object.fromEntries((D.requirements || []).map(r => [r.req_id, r]));
  if (!ov.length) { $('ovlist').innerHTML = '<div class="none">No confirmed overlaps in this document.</div>'; return; }
  $('ovlist').innerHTML = ov.slice().sort((x, y) => y.score - x.score).map(o => { const a = byId[o.a_id], b = byId[o.b_id];
    return `<div class="ovpair">
      <div class="top"><span class="ids">${esc(o.a_id)} ~ ${esc(o.b_id)}</span>
        <span class="score" style="background:${ovColor(o.score)}" title="cosine similarity ${o.score}">${Math.round(o.score * 100)}%</span></div>
      <div class="ovreq"><span class="rid">${esc(o.a_id)}</span>${a ? esc(a.text) : ''}</div>
      <div class="ovreq"><span class="rid">${esc(o.b_id)}</span>${b ? esc(b.text) : ''}</div></div>`; }).join('');
}

// ---- boot: same picker sources as the dashboard (static data/ + API documents) ----
if (window.SCORECARD) {
  showOnly(window.SCORECARD.source_file); renderOverlaps(window.SCORECARD);
} else {
  const loadDoc = value => {
    const i = value.indexOf(':'), src = value.slice(0, i), id = value.slice(i + 1);
    const url = src === 'api' ? 'documents/' + id + '/scorecard' : 'data/' + id;
    return fetch(url).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(renderOverlaps).catch(e => { $('ovlist').innerHTML = '<div class="none">Failed to load document.</div>'; console.error(e); });
  };
  const staticP = fetch('data/index.json').then(r => r.ok ? r.json() : []).then(d => Array.isArray(d) ? d : []).catch(() => []);
  const apiP = fetch('documents').then(r => r.ok ? r.json() : { documents: [] }).then(d => (d && d.documents) || []).catch(() => []);
  Promise.all([staticP, apiP]).then(([statics, apis]) => {
    const opts = statics.map(d => ({ value: 'static:' + d.file, name: d.name }));
    for (const d of apis) { if (!d.total) continue; opts.push({ value: 'api:' + d.doc_id, name: d.source_file + ' · ' + d.total }); }
    if (!opts.length) { showOnly('no documents'); $('ovlist').innerHTML = '<div class="none">No documents available.</div>'; return; }
    const want = new URLSearchParams(location.search).get('doc');
    const startVal = (want && opts.find(o => o.value === 'api:' + want) || opts[0]).value;
    setDocOptions(opts, startVal, loadDoc);
    loadDoc(startVal);
  });
}
</script>
