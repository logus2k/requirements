services:
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    image: reqqa-ingest:latest
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      # Models are baked into the image at /opt/docling-models (see Dockerfile).
      # OCR off by default; set to "1" to enable for scanned PDFs.
      DOCLING_OCR: "0"
    volumes:
      # Live-mount source for iteration (remove for an immutable image).
      - ./src:/app/src:ro
    # GPU access via the NVIDIA container toolkit.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # reqoach: single-container backend — serves the static dashboard + editor,
  # the orchestration REST API, AND socket.io (job progress + live assess), all
  # on one origin (host :7802). Replaces the old static-nginx `dashboard`.
  # Markdown is ingested in-process; PDF/DOCX are delegated to `ingest` (:5601).
  reqoach:
    build:
      context: .
      dockerfile: Dockerfile.orchestration
    image: reqqa-orchestration:latest
    restart: unless-stopped
    # Host networking: binds host :7802 (nginx upstream) and reaches
    # agent_server/llama-server/ingest on localhost with no rewiring.
    network_mode: host
    environment:
      AGENT_SERVER_URL: http://localhost:7701
      LLAMA_SERVER_URL: http://localhost:8500
      INGEST_URL: http://localhost:5601
      REQQA_STORE: /app/store
    volumes:
      - ./store:/app/store                       # persist jobs + scorecards
      - ./frontend/data:/app/frontend/data:ro    # existing scorecards in the picker

volumes:
  docling_cache:
