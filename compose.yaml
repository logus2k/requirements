services:
  # reqoach: the frontend for the requirements pipeline — the dashboard, the Live
  # Editor, the project pages. It runs a thin BFF (`reqqa.bff`) that serves those
  # static pages and proxies every analysis call to the Analyst Agent (:7803), so
  # the browser still talks to a single origin.
  #
  # reqoach holds NO analysis data: the store, the INCOSE catalog and the whole
  # engine live in the Analyst. It is a consumer, exactly like the Architect.
  reqoach:
    build:
      context: .
      dockerfile: Dockerfile.orchestration
    image: reqqa-orchestration:latest
    restart: unless-stopped
    # Host networking: binds host :7802 (the nginx upstream) and reaches the
    # Analyst on localhost with no rewiring.
    network_mode: host
    environment:
      ANALYST_URL: http://localhost:7803
    volumes:
      # Legacy static scorecards still offered in the frontend's file picker.
      - ./frontend/data:/app/frontend/data:ro
