# Dashboard static server. frontend/ is mounted read-only at the web root; this
# conf dir is mounted at /etc/nginx/conf.d (a DIRECTORY mount, so edits are seen
# live — a single-file bind mount pins to the inode at mount time and goes stale
# after an editor's atomic write).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Large scorecard JSON compresses very well over the wire.
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1024;

    # Vendored, version-pinned libraries never change in place — cache hard so
    # repeat loads don't even revalidate (echarts is the biggest single asset).
    location /vendor/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Data changes when scorecards are regenerated on the host; don't let the
    # browser cache stale scorecards or the document index (ETag still yields
    # 304s on unchanged files, so this is a revalidate, not a re-download).
    location /data/ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
